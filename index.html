<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/styles.css">
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

<main>
  <div class="image-wrapper">    <picture>
    <source media="(min-width: 600px)" srcset="images/image-product-desktop.jpg">
    <img src="images/image-product-mobile.jpg" alt="photo of the product">
  </picture></div>
  

  <div class="main-content"><p class="perfume">Perfume</p>
    <h1>Gabrielle Essence<br> Eau De Parfum</h1>

    <p class="description">A floral, solar and voluptuous<br> interpretation composed by Olivier<br> Polge,
      Perfumer-Creator for the House<br> of CHANEL.</p>

    <div class="price"><span class="current">$149.99</span>
      <span  class="previous">$169.99</span></div>

    <button class="add-button"><span>Add to Cart</span></button></div></main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Stas Serhii</a>.
  </footer>
</body>
</html>
